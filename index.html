<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Portfólio Maria - Enrolados ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Reset e Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0710;
            color: #f5f0ff;
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Lanternas Flutuantes */
        .lights-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .light {
            position: absolute;
            background: radial-gradient(circle, rgba(255,215,0,0.8), rgba(255,160,0,0.3));
            border-radius: 50%;
            box-shadow: 0 0 20px 4px rgba(255,215,0,0.6);
            animation: floatLight 8s infinite alternate ease-in-out;
            opacity: 0.6;
        }
        @keyframes floatLight {
            0% { transform: translateY(0px) translateX(0px); opacity: 0.4; }
            100% { transform: translateY(-100px) translateX(40px); opacity: 0.9; }
        }

        /* Container Principal */
        .container { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

        .hero { text-align: center; margin-bottom: 3rem; }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            background: linear-gradient(135deg, #F5E6B2, #E6C87A, #CFB56B);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .greeting { color: #eac56b; margin-top: 10px; font-weight: 600; }

        /* Grade de Matérias */
        .subjects-grid {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 1rem; margin-bottom: 2.5rem;
        }
        .subject-card {
            background: rgba(30, 25, 55, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(230, 200, 120, 0.3);
            border-radius: 50px; padding: 0.7rem 1.5rem;
            cursor: pointer; transition: 0.3s; color: #ffefcf;
            display: flex; align-items: center; gap: 8px;
        }
        .subject-card:hover, .subject-card.active {
            background: linear-gradient(135deg, #4a2f6d, #2c1b46);
            border-color: #ffdd99; transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(234, 197, 107, 0.2);
        }

        /* Área de Conteúdo */
        .content-section {
            background: rgba(15, 12, 28, 0.8);
            border-radius: 2rem; border: 1px solid rgba(218, 185, 90, 0.2);
            padding: 2rem; min-height: 300px;
        }
        .aula-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 1.2rem; padding: 1.5rem; margin-bottom: 1.2rem;
            border-left: 4px solid #eac56b; transition: 0.3s;
        }
        .aula-item:hover { background: rgba(255, 255, 255, 0.06); transform: translateX(5px); }

        /* Botões de Links */
        .links-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .btn-link {
            background: #2a1b46; color: #ffefcf; padding: 8px 18px;
            border-radius: 20px; text-decoration: none; font-size: 0.85rem;
            border: 1px solid #eac56b; transition: 0.2s;
        }
        .btn-link:hover { background: #eac56b; color: #0b0710; }

        /* Estilo QR Code */
        .qr-display { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 15px; }
        .qr-card { 
            background: white; padding: 12px; border-radius: 12px; 
            text-align: center; color: #333; width: 170px;
        }
        .qr-card img { width: 100%; border-radius: 4px; margin-bottom: 8px; }

        .floating-signature {
            position: fixed; bottom: 20px; left: 20px;
            font-size: 0.75rem; color: #eac56b; background: rgba(0,0,0,0.5);
            padding: 8px 15px; border-radius: 20px; z-index: 100;
        }
    </style>
</head>
<body>

<div class="lights-background" id="lightsContainer"></div>
<div class="floating-signature">🕯️ "Enrolada nos códigos, mas sempre brilhando" ✨</div>

<div class="container">
    <div class="hero">
        <div style="font-size: 2rem; margin-bottom: 10px;">🏮✨</div>
        <h1>Portfólio Maria</h1>
        <div class="greeting">Bem-vinda de volta ao seu reino digital!</div>
    </div>

    <div class="subjects-grid" id="subjectsGrid"></div>

    <div class="content-section">
        <div id="dynamicTitle"></div>
        <div id="aulasContainer"></div>
    </div>
</div>

<script>
    // 1. Base de Dados Organizada
    const aulasData = {
        "analise": {
            nomeExibicao: "Análise 📊", icone: "fas fa-chart-line",
            aulas: [
                { nome: "📄 Agenda Escolar Digital", descricao: "Planejamento e organização escolar no Gamma.", links: [{ nome: "📖 Acessar Gamma", url: "https://gamma.app/docs/Agenda-Escolar-Digital-eecx4lgl6d43c8i?mode=doc" }] },
                { nome: "🏛️ Propriedade Intelectual", descricao: "Protegendo a Inovação e Criatividade.", links: [{ nome: "📖 Ver Documento", url: "https://gamma.app/docs/O-Universo-da-Propriedade-Intelectual-81yhzqzlh6ygpji?mode=doc" }] },
                { nome: "🚀 Ecossistema de Startups 2026", descricao: "A Nova Era dos Unicórnios Latino-Americanos.", links: [{ nome: "📖 Ver Documento", url: "https://gamma.app/docs/Ecossistema-de-Startups-2026-A-Nova-Era-dos-Unicornios-Latino-Ame-rrlvid92y60z8at" }] }
            ]
        },
        "javascript": {
            nomeExibicao: "JavaScript 💛", icone: "fab fa-js",
            aulas: [
                { nome: "📦 Variáveis em JS", descricao: "Estudo sobre tipos de dados e declarações.", links: [{ nome: "🐙 Repositório", url: "https://github.com/maria-off/variaveis" }] },
                { nome: "🔄 Estrutura For", descricao: "Dominando laços de repetição.", links: [{ nome: "🐙 Repositório", url: "https://github.com/maria-off/Usando-For" }] },
                { nome: "⏸️ Break e Continue", descricao: "Controle de fluxo em loops.", links: [{ nome: "🐙 Repositório", url: "https://github.com/maria-off/breake-continue" }] },
                { nome: "🔍 Método Filtra", descricao: "Filtragem de arrays em JavaScript.", links: [{ nome: "🐙 Repositório", url: "https://github.com/maria-off/filtra" }] }
            ]
        },
        "algoritmos": {
            nomeExibicao: "Algoritmos ⚙️", icone: "fas fa-code-branch",
            aulas: [
                { nome: "🔄 Selection Sort", descricao: "Lógica de ordenação passo a passo.", links: [{ nome: "🐙 Repositório", url: "https://github.com/maria-off/SelectionSort" }] },
                { nome: "📊 Ordenados", descricao: "Estudos de algoritmos de organização.", links: [{ nome: "🐙 Repositório", url: "https://github.com/maria-off/ordenados" }] }
            ]
        },
        "html-projetos": {
            nomeExibicao: "Projetos Web 🌐", icone: "fab fa-html5",
            aulas: [
                { nome: "🧪 Teste GitHub Pages", descricao: "Primeiro deploy realizado com sucesso.", links: [{ nome: "🌍 Ver Site", url: "https://maria-off.github.io/teste/teste.html" }] },
                { nome: "📅 Terceirão 2026", descricao: "Projeto dedicado à turma de 2026.", links: [{ nome: "🌍 Ver Site", url: "https://maria-off.github.io/Terceir-o-2026/teste.html" }] }
            ]
        },
        "mobile": {
            nomeExibicao: "Mobile 📱", icone: "fas fa-mobile-alt",
            aulas: [
                { nome: "📲 QR Codes de Acesso", descricao: "Escaneie para abrir no celular.", isQR: true, qrs: [
                    { label: "Projeto 01", img: "1.png" },
                    { label: "Projeto 02", img: "2.png" }
                ]}
            ]
        },
        "games": {
            nomeExibicao: "Games 🎮", icone: "fas fa-gamepad",
            aulas: [
                { nome: "🕹️ PAC-MAN Retro", descricao: "Desenvolvimento do clássico arcade.", links: [{ nome: "🎮 Jogar Agora", url: "https://maria-off.github.io/PAC-MAN/index.html" }] }
            ]
        }
    };

    // 2. Função para renderizar conteúdo
    function renderSubject(key) {
        const data = aulasData[key];
        const container = document.getElementById('aulasContainer');
        const titleDiv = document.getElementById('dynamicTitle');

        // Atualiza Título da Seção
        titleDiv.innerHTML = `<h2 style="margin-bottom: 20px;"><i class="${data.icone}"></i> ${data.nomeExibicao}</h2>`;
        
        let html = '';
        data.aulas.forEach(aula => {
            html += `<div class="aula-item">
                <h3>${aula.nome}</h3>
                <p style="color: #b9ad8f; font-size: 0.9rem; margin: 5px 0;">${aula.descricao}</p>`;
            
            if(aula.isQR) {
                html += `<div class="qr-display">`;
                aula.qrs.forEach(qr => {
                    html += `<div class="qr-card"><img src="${qr.img}" alt="QR"><p style="font-weight:bold; font-size:0.8rem;">${qr.label}</p></div>`;
                });
                html += `</div>`;
            } else {
                html += `<div class="links-container">`;
                aula.links.forEach(l => {
                    html += `<a href="${l.url}" target="_blank" class="btn-link"><i class="fas fa-external-link-alt"></i> ${l.nome}</a>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
        });
        
        container.innerHTML = html;

        // Gerenciar classe ativa nos botões
        document.querySelectorAll('.subject-card').forEach(c => c.classList.remove('active'));
        document.querySelector(`[data-subject="${key}"]`).classList.add('active');
    }

    // 3. Inicializar botões da grade
    const grid = document.getElementById('subjectsGrid');
    Object.keys(aulasData).forEach(key => {
        const btn = document.createElement('div');
        btn.className = 'subject-card';
        btn.setAttribute('data-subject', key);
        btn.innerHTML = `<i class="${aulasData[key].icone}"></i> ${aulasData[key].nomeExibicao}`;
        btn.onclick = () => renderSubject(key);
        grid.appendChild(btn);
    });

    // 4. Efeito de Luzes (Lanternas)
    for (let i = 0; i < 40; i++) {
        const light = document.createElement('div');
        light.className = 'light';
        light.style.left = Math.random() * 100 + '%';
        light.style.top = Math.random() * 100 + '%';
        const size = Math.random() * 10 + 5 + 'px';
        light.style.width = size; light.style.height = size;
        light.style.animationDelay = Math.random() * 5 + 's';
        light.style.animationDuration = (Math.random() * 5 + 5) + 's';
        document.getElementById('lightsContainer').appendChild(light);
    }

    // Iniciar na primeira categoria
    renderSubject('analise');
</script>

</body>
</html>
